build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build Electron App
        # Lệnh dưới đây đã được sửa để phù hợp với electron-builder
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build -- --win
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build -- --mac
          else
            npm run build -- --linux
          fi