name: Build, Test, and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Quan trọng: Để nếu 1 cái lỗi, các cái khác vẫn chạy tiếp
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Thêm cache để chạy nhanh và ổn định hơn

      - run: npm install

      - name: Build Electron App
        # Dùng lệnh này để tự động nhận diện hệ điều hành của máy ảo
        run: npm run build -- -${{ matrix.os == 'windows-latest' && 'w' || matrix.os == 'macos-latest' && 'm' || 'l' }}